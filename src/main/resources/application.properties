# =====================================================================
# Application
# =====================================================================
spring.application.name=sevenspeed-tracking

# =====================================================================
# Database
# =====================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSLMODE}
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================================================
# JPA / Hibernate
# =====================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# validate: Hibernate cek schema cocok sama entity, tapi TIDAK auto-create/alter
# DDL sepenuhnya dihandle Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# =====================================================================
# Logging SQL (aktifkan kalau perlu debug query)
# =====================================================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =====================================================================
# Flyway
# =====================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# =====================================================================
# Jackson
# =====================================================================
spring.jackson.time-zone=Asia/Jakarta
#spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# =====================================================================
# JWT (override via env var di production)
# =====================================================================
app.jwt.secret=JWT_SECRET
app.jwt.access-token-expiry-ms=JWT_ACCESS_EXPIRY_MS
app.jwt.refresh-token-expiry-ms=JWT_REFRESH_EXPIRY_MS

# =====================================================================
# SpringDoc / Swagger UI
# =====================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true